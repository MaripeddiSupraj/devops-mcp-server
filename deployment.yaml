apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-mcp-sa
  labels:
    app: devops-mcp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-mcp-readonly
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-mcp-readonly-binding
subjects:
- kind: ServiceAccount
  name: devops-mcp-sa
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devops-mcp-readonly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-mcp
  labels:
    app: devops-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-mcp
  template:
    metadata:
      labels:
        app: devops-mcp
    spec:
      serviceAccountName: devops-mcp-sa
      containers:
      - name: mcp
        image: devops-mcp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: sse
        env:
        - name: MCP_TRANSPORT
          value: "sse"
        - name: MCP_AUTH_ENABLED
          value: "false"
        # Example token list for static bearer auth when enabled.
        # Use secret refs in production instead of plain text env vars.
        - name: MCP_AUTH_TOKENS
          value: ""
        - name: TERRAFORM_ALLOW_UNRESTRICTED
          value: "false"
        # Update to one or more comma-separated safe IaC roots in your runtime.
        - name: TERRAFORM_ALLOWED_ROOTS
          value: "/workspace/infra"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: devops-mcp
spec:
  selector:
    app: devops-mcp
  ports:
  - port: 80
    targetPort: 8000
    name: http
